<div class="modulo-container">
  
  <div class="modulo-header">
    <div>
      <h2>Centro de Reportes</h2>
      <p>Generación y exportación de datos en formato PDF</p>
    </div>
  </div>

  <div class="grid-reportes">
    
    <div class="tarjeta-reporte">
      <div class="icono-reporte">📅</div>
      <h3>Reporte General de Citas</h3>
      <p>Descarga un documento oficial con todas las citas médicas agendadas en el sistema, detallando el paciente y el médico asignado.</p>
      
      @if (cargando) {
        <button class="btn-primario cargando" disabled>Generando PDF...</button>
      } @else {
        <button class="btn-primario" (click)="generarReporteCitas()">📄 Descargar PDF</button>
      }
    </div>

    

  </div>
</div>
