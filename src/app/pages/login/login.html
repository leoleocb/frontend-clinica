<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Iniciar Sesión</h2>
      <p>Bienvenido al portal médico</p>
    </div>

    <form (ngSubmit)="ingresar()">
      
      <div class="input-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" [(ngModel)]="credenciales.username" required placeholder="Ej. admin" [class.input-error]="errorLogin">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="credenciales.password" required placeholder="******" [class.input-error]="errorLogin">
      </div>

      <button type="submit" class="btn-login">Ingresar al Sistema</button>
      
    </form>
  </div>
</div>
